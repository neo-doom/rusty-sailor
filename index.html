<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B1426">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sail Fit">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Sailing Fitness Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg-deep: #0B1426;
    --bg-card: #0F2040;
    --bg-card-hover: #132848;
    --bg-bar: #1E3A5F;
    --blue-accent: #38BDF8;
    --blue-glow: rgba(56,189,248,0.15);
    --green: #10B981;
    --green-soft: rgba(16,185,129,0.08);
    --green-border: rgba(16,185,129,0.25);
    --green-text: #86EFAC;
    --text-primary: #F1F5F9;
    --text-secondary: #E2E8F0;
    --text-muted: #94A3B8;
    --text-dim: #64748B;
    --text-detail: #7B93AD;
    --red: #EF4444;
    --yellow: #F59E0B;
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: 'DM Serif Display', Georgia, serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html { background: var(--bg-deep); }
  
  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text-secondary);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .texture {
    position: fixed; inset: 0; opacity: 0.03; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(135deg, transparent, transparent 40px, rgba(56,189,248,0.4) 40px, rgba(56,189,248,0.4) 41px);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: calc(var(--safe-top) + 8px) 16px calc(var(--safe-bottom) + 100px);
  }

  /* Header */
  .header { padding: 20px 0 16px; text-align: center; }
  .header-label { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--blue-accent); font-weight: 600; margin-bottom: 4px; }
  .header-title { font-family: var(--font-display); font-size: 26px; color: var(--text-primary); line-height: 1.2; }
  .header-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

  /* Overall progress */
  .overall {
    background: linear-gradient(135deg, #0F2847, #162F5A);
    border-radius: 16px; padding: 16px 18px; margin-bottom: 18px;
    border: 1px solid var(--blue-glow);
  }
  .overall-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .overall-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .overall-pct { font-size: 22px; font-weight: 700; color: var(--blue-accent); font-family: var(--font-display); }
  .bar { height: 8px; background: var(--bg-bar); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .bar-fill.blue { background: linear-gradient(90deg, #0EA5E9, #38BDF8); }
  .overall-sub { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  /* Scrollable selectors */
  .scroll-row {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .scroll-row::-webkit-scrollbar { display: none; }

  /* Week buttons */
  .week-btn {
    flex: 0 0 auto; padding: 8px 12px; border-radius: 12px; border: 2px solid transparent;
    background: var(--bg-card); cursor: pointer; min-width: 52px; position: relative;
    transition: all 0.2s; text-align: center; -webkit-tap-highlight-color: transparent;
  }
  .week-btn.active { border-color: var(--phase-color); background: color-mix(in srgb, var(--phase-color) 8%, transparent); }
  .week-btn-label { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 1px; transition: color 0.2s; }
  .week-btn.active .week-btn-label { color: var(--phase-color); }
  .week-btn:not(.active) .week-btn-label { color: var(--text-dim); }
  .week-btn-num { font-size: 17px; font-weight: 700; transition: color 0.2s; }
  .week-btn.active .week-btn-num { color: var(--text-primary); }
  .week-btn:not(.active) .week-btn-num { color: var(--text-muted); }
  .week-check {
    position: absolute; top: -3px; right: -3px; width: 15px; height: 15px; border-radius: 50%;
    background: var(--green); display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #fff; line-height: 1;
  }
  .week-bar { margin-top: 4px; height: 3px; border-radius: 2px; background: var(--bg-bar); overflow: hidden; }
  .week-bar-fill { height: 100%; border-radius: 2px; background: var(--phase-color); }

  /* Phase banner */
  .phase-banner {
    border-radius: 12px; padding: 11px 14px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 11px;
    background: color-mix(in srgb, var(--phase-color) 6%, transparent);
    border: 1px solid color-mix(in srgb, var(--phase-color) 18%, transparent);
  }
  .phase-icon { font-size: 26px; }
  .phase-name { font-size: 13px; font-weight: 700; color: var(--phase-color); }
  .phase-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* Day tabs */
  .day-btn {
    flex: 0 0 auto; padding: 7px 13px; border-radius: 10px;
    background: transparent; border: 1px solid transparent;
    cursor: pointer; text-align: center; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .day-btn.active { background: var(--bg-bar); border-color: rgba(56,189,248,0.3); }
  .day-btn-label { font-size: 11px; font-weight: 600; white-space: nowrap; transition: color 0.2s; }
  .day-btn.active .day-btn-label { color: var(--blue-accent); }
  .day-btn:not(.active) .day-btn-label { color: var(--text-dim); }
  .day-dot { width: 6px; height: 6px; border-radius: 50%; margin: 4px auto 0; }

  /* Day header */
  .day-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .day-title { font-size: 16px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
  .day-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .mark-all-btn {
    padding: 5px 13px; border-radius: 8px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border: 1px solid rgba(148,163,184,0.2);
    background: var(--bg-bar); color: var(--text-muted);
    -webkit-tap-highlight-color: transparent;
  }
  .mark-all-btn.done { background: var(--green); color: #fff; border-color: var(--green); }

  .day-bar { height: 4px; background: var(--bg-bar); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
  .day-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* Exercise items */
  .exercises { display: flex; flex-direction: column; gap: 7px; }
  .exercise {
    display: flex; gap: 12px; align-items: flex-start; padding: 13px 14px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid rgba(30,58,95,0.6);
    cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  .exercise.checked { background: var(--green-soft); border-color: var(--green-border); }
  .exercise:active { transform: scale(0.985); }

  .checkbox {
    width: 23px; height: 23px; border-radius: 7px; flex-shrink: 0; margin-top: 1px;
    background: transparent; border: 2px solid #3B5276;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .exercise.checked .checkbox { background: var(--green); border-color: var(--green); }

  .ex-name { font-size: 13.5px; font-weight: 600; color: var(--text-secondary); transition: all 0.2s; }
  .exercise.checked .ex-name { color: var(--green-text); text-decoration: line-through; text-decoration-color: rgba(134,239,172,0.3); }
  .ex-detail { font-size: 11.5px; color: var(--text-detail); margin-top: 2px; line-height: 1.4; transition: color 0.2s; }
  .exercise.checked .ex-detail { color: #4B7A5E; }

  /* Stretch section */
  .stretch-toggle {
    width: 100%; margin-top: 18px; padding: 13px 14px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid rgba(56,189,248,0.2);
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  .stretch-toggle-left { display: flex; align-items: center; gap: 9px; }
  .stretch-toggle-label { font-size: 13px; font-weight: 600; color: var(--blue-accent); }
  .stretch-arrow { color: var(--text-dim); font-size: 16px; transition: transform 0.2s; }
  .stretch-arrow.open { transform: rotate(180deg); }

  .stretch-list { margin-top: 7px; display: flex; flex-direction: column; gap: 5px; }
  .stretch-item { padding: 11px 14px; border-radius: 10px; background: var(--bg-card); border: 1px solid rgba(30,58,95,0.5); }
  .stretch-name { font-size: 12.5px; font-weight: 600; color: #CBD5E1; }
  .stretch-detail { font-size: 11.5px; color: var(--text-detail); margin-top: 2px; }

  /* Notes section */
  .notes-section { margin-top: 20px; }
  .notes-toggle {
    width: 100%; padding: 13px 14px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid rgba(245,158,11,0.2);
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  .notes-label { font-size: 13px; font-weight: 600; color: var(--yellow); }
  .notes-textarea {
    width: 100%; margin-top: 7px; padding: 12px 14px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid rgba(245,158,11,0.15);
    color: var(--text-secondary); font-family: var(--font-body); font-size: 13px;
    line-height: 1.5; resize: vertical; min-height: 80px; outline: none;
  }
  .notes-textarea::placeholder { color: var(--text-dim); }
  .notes-textarea:focus { border-color: rgba(245,158,11,0.4); }

  /* Reset */
  .reset-area { margin-top: 30px; text-align: center; }
  .reset-btn {
    padding: 7px 18px; border-radius: 8px; background: transparent;
    border: 1px solid rgba(239,68,68,0.3); color: var(--red);
    font-size: 11px; font-weight: 600; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
    font-family: var(--font-body);
  }
  .reset-btn:active { opacity: 1; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%);
    padding: 7px 14px; border-radius: 8px; background: var(--bg-bar); color: var(--blue-accent);
    font-size: 11px; font-weight: 600; border: 1px solid rgba(56,189,248,0.3); z-index: 10;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hidden { display: none !important; }

  @media (hover: hover) {
    .exercise:hover { background: var(--bg-card-hover); }
    .exercise.checked:hover { background: rgba(16,185,129,0.12); }
    .reset-btn:hover { opacity: 1; }
  }
</style>
</head>
<body>

<div class="texture"></div>

<div class="container">
  <div class="header">
    <div class="header-label">10-Week Sailing Prep</div>
    <h1 class="header-title">Fitness Tracker</h1>
    <div class="header-sub">Milwaukee, WI — Course starts May 18</div>
  </div>

  <div class="overall">
    <div class="overall-top">
      <span class="overall-label">Overall Progress</span>
      <span class="overall-pct" id="overallPct">0%</span>
    </div>
    <div class="bar"><div class="bar-fill blue" id="overallBar" style="width:0%"></div></div>
    <div class="overall-sub" id="overallSub">0 / 0 exercises completed</div>
  </div>

  <div class="scroll-row" id="weekRow"></div>
  <div id="phaseBanner"></div>
  <div class="scroll-row" id="dayRow"></div>

  <div class="day-header">
    <div>
      <div class="day-title" id="dayTitle"></div>
      <div class="day-sub" id="daySub"></div>
    </div>
    <button class="mark-all-btn" id="markAllBtn" onclick="toggleMarkAll()">Mark All</button>
  </div>
  <div class="day-bar"><div class="day-bar-fill" id="dayBar" style="width:0%"></div></div>

  <div class="exercises" id="exerciseList"></div>

  <button class="stretch-toggle" onclick="toggleStretches()">
    <div class="stretch-toggle-left">
      <span style="font-size:18px">🧘</span>
      <span class="stretch-toggle-label">Flexibility & Mobility Routine</span>
    </div>
    <span class="stretch-arrow" id="stretchArrow">▾</span>
  </button>
  <div class="stretch-list hidden" id="stretchList"></div>

  <div class="notes-section">
    <button class="notes-toggle" onclick="toggleNotes()">
      <div class="stretch-toggle-left">
        <span style="font-size:18px">📝</span>
        <span class="notes-label">Workout Notes</span>
      </div>
      <span class="stretch-arrow" id="notesArrow">▾</span>
    </button>
    <div class="hidden" id="notesArea">
      <textarea class="notes-textarea" id="notesInput" placeholder="Jot down weights used, how you felt, what to adjust next week..." oninput="saveNotes()"></textarea>
    </div>
  </div>

  <div class="reset-area">
    <button class="reset-btn" onclick="resetAll()">Reset All Progress</button>
  </div>
</div>

<div class="toast" id="toast">Saved ✓</div>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const STORAGE_KEY = 'sailing-fitness-progress';
const NOTES_KEY = 'sailing-fitness-notes';

let progress = {};
let activeWeek = 0;
let activeDay = 0;
let stretchesOpen = false;
let notesOpen = false;
let toastTimer = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch(e) {}
  // Restore last viewed week/day
  try {
    const pos = localStorage.getItem('sailing-fitness-pos');
    if (pos) { const p = JSON.parse(pos); activeWeek = p.w || 0; activeDay = p.d || 0; }
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    localStorage.setItem('sailing-fitness-pos', JSON.stringify({w: activeWeek, d: activeDay}));
  } catch(e) {}
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1200);
}

// ═══════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════
function dayProgress(wi, di) {
  const exs = PLAN[wi].days[di].ex;
  let done = 0;
  exs.forEach((_, ei) => { if (progress[`${wi}-${di}-${ei}`]) done++; });
  return { done, total: exs.length, pct: Math.round((done / exs.length) * 100) };
}

function weekProgress(wi) {
  let done = 0, total = 0;
  PLAN[wi].days.forEach((day, di) => {
    day.ex.forEach((_, ei) => { total++; if (progress[`${wi}-${di}-${ei}`]) done++; });
  });
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

function overallProgress() {
  let done = 0, total = 0;
  PLAN.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      d.ex.forEach((_, ei) => { total++; if (progress[`${wi}-${di}-${ei}`]) done++; });
    });
  });
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const ov = overallProgress();
  document.getElementById('overallPct').textContent = ov.pct + '%';
  document.getElementById('overallBar').style.width = ov.pct + '%';
  document.getElementById('overallSub').textContent = `${ov.done} / ${ov.total} exercises completed`;

  // Week row
  const wr = document.getElementById('weekRow');
  wr.innerHTML = '';
  PLAN.forEach((w, wi) => {
    const wp = weekProgress(wi);
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (wi === activeWeek ? ' active' : '');
    btn.style.setProperty('--phase-color', w.pc);
    btn.onclick = () => { activeWeek = wi; activeDay = 0; render(); save(); };
    let html = `<div class="week-btn-label">WK</div><div class="week-btn-num">${w.week}</div>`;
    if (wp.pct === 100) html += `<div class="week-check">✓</div>`;
    else if (wp.pct > 0) html += `<div class="week-bar"><div class="week-bar-fill" style="width:${wp.pct}%"></div></div>`;
    btn.innerHTML = html;
    wr.appendChild(btn);
  });
  // Scroll active into view
  const activeBtn = wr.querySelector('.week-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });

  const cw = PLAN[activeWeek];
  const ph = PHASES[cw.pn];

  // Phase banner
  document.getElementById('phaseBanner').innerHTML = `
    <div class="phase-banner" style="--phase-color:${cw.pc}">
      <span class="phase-icon">${ph.icon}</span>
      <div><div class="phase-name">Phase ${cw.pn}: ${ph.name}</div><div class="phase-desc">${ph.desc}</div></div>
    </div>`;

  // Day tabs
  const dr = document.getElementById('dayRow');
  dr.innerHTML = '';
  cw.days.forEach((d, di) => {
    const dp = dayProgress(activeWeek, di);
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (di === activeDay ? ' active' : '');
    btn.onclick = () => { activeDay = di; render(); save(); };
    let dot = '';
    if (dp.pct === 100) dot = `<div class="day-dot" style="background:var(--green)"></div>`;
    else if (dp.pct > 0) dot = `<div class="day-dot" style="background:${cw.pc}"></div>`;
    btn.innerHTML = `<div class="day-btn-label">${d.dow}</div>${dot}`;
    dr.appendChild(btn);
  });

  const cd = cw.days[activeDay];
  const dp = dayProgress(activeWeek, activeDay);

  document.getElementById('dayTitle').textContent = cd.name;
  document.getElementById('daySub').textContent = `${dp.done}/${dp.total} exercises • ${dp.pct}%`;

  const mab = document.getElementById('markAllBtn');
  if (dp.pct === 100) { mab.className = 'mark-all-btn done'; mab.textContent = '✓ Done'; }
  else { mab.className = 'mark-all-btn'; mab.textContent = 'Mark All'; }

  const db = document.getElementById('dayBar');
  db.style.width = dp.pct + '%';
  db.style.background = dp.pct === 100 ? 'var(--green)' : cw.pc;

  // Exercises
  const el = document.getElementById('exerciseList');
  el.innerHTML = '';
  cd.ex.forEach((ex, ei) => {
    const key = `${activeWeek}-${activeDay}-${ei}`;
    const checked = !!progress[key];
    const div = document.createElement('div');
    div.className = 'exercise' + (checked ? ' checked' : '');
    div.onclick = () => { progress[key] = !progress[key]; save(); render(); };
    div.innerHTML = `
      <div class="checkbox">${checked ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div>
      <div style="flex:1;min-width:0">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-detail">${ex.d}</div>
      </div>`;
    el.appendChild(div);
  });

  // Notes
  const weekKey = `${NOTES_KEY}-w${activeWeek}`;
  const notesInput = document.getElementById('notesInput');
  try { notesInput.value = localStorage.getItem(weekKey) || ''; } catch(e) {}
}

// ACTIONS

function toggleMarkAll() {
  const cw = PLAN[activeWeek];
  const cd = cw.days[activeDay];
  const dp = dayProgress(activeWeek, activeDay);
  const allDone = dp.pct === 100;
  cd.ex.forEach((_, ei) => { progress[`${activeWeek}-${activeDay}-${ei}`] = !allDone; });
  save(); render();
}

function toggleStretches() {
  stretchesOpen = !stretchesOpen;
  const sl = document.getElementById('stretchList');
  const sa = document.getElementById('stretchArrow');
  if (stretchesOpen) {
    sl.classList.remove('hidden');
    sa.classList.add('open');
    if (!sl.hasChildNodes()) {
      STRETCHES.forEach(s => {
        const d = document.createElement('div');
        d.className = 'stretch-item';
        d.innerHTML = `<div class="stretch-name">${s.n}</div><div class="stretch-detail">${s.d}</div>`;
        sl.appendChild(d);
      });
    }
  } else {
    sl.classList.add('hidden');
    sa.classList.remove('open');
  }
}

function toggleNotes() {
  notesOpen = !notesOpen;
  const na = document.getElementById('notesArea');
  const narr = document.getElementById('notesArrow');
  na.classList.toggle('hidden', !notesOpen);
  narr.classList.toggle('open', notesOpen);
  if (notesOpen) document.getElementById('notesInput').focus();
}

function saveNotes() {
  const weekKey = `${NOTES_KEY}-w${activeWeek}`;
  try { localStorage.setItem(weekKey, document.getElementById('notesInput').value); } catch(e) {}
}

function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    progress = {};
    try {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem('sailing-fitness-pos');
      for (let i = 0; i < 10; i++) localStorage.removeItem(`${NOTES_KEY}-w${i}`);
    } catch(e) {}
    activeWeek = 0; activeDay = 0;
    render();
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
load();
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
